nelmio_cors:
  defaults:
    allow_credentials: false
    allow_origin:
      - 'https://www.lueur-eternite.fr'
      - 'https://lueur-eternite.fr'
      - 'http://localhost:3000'
      - 'http://127.0.0.1:3000'
      - 'https://localhost:3000'
      - 'https://127.0.0.1:3000'
    allow_headers: ['Content-Type', 'Authorization', 'Accept', 'Origin', 'X-Requested-With']
    expose_headers: ['Link']
    allow_methods: ['GET', 'POST', 'PUT', 'PATCH', 'DELETE', 'OPTIONS']
    max_age: 3600

  paths:
    '^/api/':
      allow_credentials: false
      allow_origin:
        - 'https://www.lueur-eternite.fr'
        - 'https://lueur-eternite.fr'
        - 'http://localhost:3000'
        - 'http://127.0.0.1:3000'
        - 'https://localhost:3000'
        - 'https://127.0.0.1:3000'
      allow_headers: ['Content-Type', 'Authorization', 'Accept', 'Origin', 'X-Requested-With']
      expose_headers: ['Link']
      allow_methods: ['GET', 'POST', 'PUT', 'PATCH', 'DELETE', 'OPTIONS']
      max_age: 3600